library: torch
include: data.yaml
dataloaders:
  data:
  dataset:
model:
optimizer:
  class: torch.optim.SGD
  params: $.model.parameters()
  lr: 1e-3
scheduler:
  class: torch.optim.lr_scheduler.ReduceLROnPlateau
  optimizer: $
  factor: 0.5
  patience: 4
results:
metrics:
  criterion:
    def: torch.nn.functional.mse_loss
monitor:
  metric: val_loss
early_stopping:
  patience: $.scheduler.patience
trainer:
  epochs: 10
  verbose: 2
