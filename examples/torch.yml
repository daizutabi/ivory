library: torch
dataloaders:
  data:
    class: rectangle.data.Data
    n_splits: 4
  dataset:
  batch_size: 10
  fold: 0
model:
  class: rectangle.torch.Model
  hidden_sizes: [100, 100]
optimizer:
  class: torch.optim.SGD
  params: $.model.parameters()
  lr: 1e-3
scheduler:
  class: torch.optim.lr_scheduler.ReduceLROnPlateau
  optimizer: $
  factor: 0.5
  patience: 4
results:
metrics:
monitor:
  metric: val_loss
early_stopping:
  patience: 10
trainer:
  loss: torch.nn.functional.mse_loss
  epochs: 10
  verbose: 2
