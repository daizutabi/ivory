experiment:
  class: ivory.core.Experiment
  data:
    class: ivory.core.data.Data
    load:
      def: simple.create_data
      num_samples: 10000
  tracker:
    class: ivory.core.Tracker
    tracking_uri: mysql+mysqldb://daizu:tabi@localhost/mlflow
    artifact_location: ~/.mlruns
  tuner:
    class: ivory.core.Tuner
    objective:
      def: simple.objective
    storage: mysql+mysqldb://daizu:tabi@localhost/optuna
    pruner:
      class: optuna.pruners.MedianPruner
    optimize_kwargs:
      n_trials: 3
run:
  class: ivory.torch.Run
  dataloader:
    class: ivory.torch.data.DataLoader
    data: $.data
    fold: 0
    batch_size: 32
  model:
    class: simple.Model
    hidden_sizes: [100, 100]
  optimizer:
    class: torch.optim.SGD
    params: $.model.parameters()
    lr: 1e-3
  scheduler:
    class: torch.optim.lr_scheduler.ReduceLROnPlateau
    optimizer: $
    factor: 0.5
    patience: 4
  metrics:
    class: ivory.torch.Metrics
    criterion:
      def: torch.nn.functional.mse_loss
  monitor:
    class: ivory.callbacks.Monitor
  early_stopping:
    class: ivory.callbacks.EarlyStopping
    patience: 8
  trainer:
    class: ivory.torch.Trainer
    max_epochs: 10
    verbose: 2
  # tracking:
  #   class: ivory.callbacks.Tracking
  #   experiment_id: $.experiment.id
  #   tracking_uri: $.tracker.tracking_uri
