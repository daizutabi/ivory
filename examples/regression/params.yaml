data:
  def: simple.create_data
  num_samples: 1000
transform:
  class: simple.Transform
  std: 0
dataloaders:
  class: simple.DataLoaders
  data: $
  transform: $
  batch_size: 32
model:
  class: simple.Model
  hidden_sizes: [10]
optimizer:
  class: torch.optim.SGD
  params: $.model.parameters()
  lr: 1e-3
  weight_decay: 1e-5
scheduler:
  class: torch.optim.lr_scheduler.ReduceLROnPlateau
  optimizer: $
  factor: 0.5
  patience: 4
metrics:
  class: simple.Metrics
  criterion: torch.nn.functional.mse_loss
tracking:
  class: ivory.callbacks.Tracking
early_stopping:
  class: ivory.callbacks.EarlyStopping
  patience: 8
trainer:
  class: ivory.torch.Trainer
  max_epochs: 200
  verbose: 0
experiment:
  class: ivory.Experiment
  name: "N{data.num_samples}-6"
  run_class: ivory.torch.Run
  run_name: ""
  shared: [data]
