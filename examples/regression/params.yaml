data:
  def: simple.create_data
  num_samples: 1000
transform:
  class: simple.Transform
  std: 0
dataloaders:
  class: simple.DataLoaders
  data: $
  transform: $
  batch_size: 32
model:
  class: simple.Model
  hidden_sizes: [10]
optimizer:
  class: torch.optim.SGD
  params: $.model.parameters()
  lr: 1e-3
  weight_decay: 1e-5
scheduler:
  class: torch.optim.lr_scheduler.StepLR
  optimizer: $
  step_size: 5
  gamma: 0.5
metrics:
  class: simple.Metrics
  criterion: torch.nn.functional.mse_loss
tracking:
  class: ivory.callbacks.Tracking
early_stopping:
  class: ivory.callbacks.EarlyStopping
trainer:
  class: simple.Trainer
  gpu: false
  max_epochs: 20
  verbose: 0
experiment:
  class: simple.Experiment
  name: "N{data.num_samples}"
  run_class: simple.Run
  run_name: "{model.hidden_sizes}"
