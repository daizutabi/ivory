language: python
dist: xenial

matrix:
  include:
    - os: linux
      python: 3.7
    - os: linux
      python: 3.8

install:
  - pip install pycodestyle pyflakes mypy coveralls pytest pytest-cov
  - pip install torch==1.4.0+cpu torchvision==0.5.0+cpu -f https://download.pytorch.org/whl/torch_stable.html
  - pip install -e .

before_script:
  - pycodestyle ivory
  - pyflakes ivory
  # - mypy pheasant
  - pycodestyle tests
  - pyflakes tests

script:
  - pytest

after_success:
  - coveralls
