language: python
dist: xenial

matrix:
  include:
    - os: linux
      python: 3.7
    - os: linux
      python: 3.8

install:
  - pip install -U setuptools
  - pip install pycodestyle pyflakes mypy
  - pip install pytest pytest-cov coveralls
  - pip install tensorflow torch torchvision lightgbm nnabla
  - pip install iterative-stratification
  - pip install -e .

before_script:
  - pycodestyle ivory
  - pyflakes ivory
  - mypy ivory
  - pycodestyle tests
  - pyflakes tests

script:
  - pytest

after_success:
  - coveralls
