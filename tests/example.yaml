experiment:
  name: example
  data:
    class: example.Data
    num_samples: 1000
  objective:
    suggest_lr: example.suggest_lr
    suggest_hidden_sizes:
      def: example.suggest_hidden_sizes
      max_num_layers: 3
    pruner:
      class: optuna.pruners.MedianPruner
run:
  library: torch
  dataloaders:
    dataset:
      def: example.Dataset
      dummy: 5
    batch_size: 10
    fold: 0
  model:
    class: example.Model
    hidden_sizes: [100, 100]
  optimizer:
    class: torch.optim.SGD
    params: $.model.parameters()
    lr: 1e-3
  scheduler:
    class: torch.optim.lr_scheduler.ReduceLROnPlateau
    optimizer: $
    factor: 0.5
    patience: 4
  results:
  metrics:
    criterion:
      def: torch.nn.functional.mse_loss
  monitor:
    metric: val_loss
  early_stopping:
    patience: 8
  trainer:
    max_epochs: 10
    verbose: 2
