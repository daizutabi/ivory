environment:
  tracker:
  tuner:
    storage: sqlite://
    pruner:
      class: optuna.pruners.MedianPruner
    load_if_exists: true
experiment:
  data:
    class: example.Data
    num_samples: 1000
  objective:
    suggest:
      def: example.suggest
run:
  library: torch
  dataloader:
    dataset:
      def: example.Dataset
    batch_size: 10
    fold: 0
  model:
    class: example.Model
    hidden_sizes: [100, 100]
  optimizer:
    class: torch.optim.SGD
    params: $.model.parameters()
    lr: 1e-3
  scheduler:
    class: torch.optim.lr_scheduler.ReduceLROnPlateau
    optimizer: $
    factor: 0.5
    patience: 4
  metrics:
    criterion:
      def: torch.nn.functional.mse_loss
  monitor:
    metrics: val_loss
  early_stopping:
    patience: 8
  trainer:
    max_epochs: 10
    verbose: 2
