site_name: Ivory
site_url: https://ivory.daizutabi.net/
site_description: A Lightweight machine learning framework
site_author: daizutabi
site_dir: ../ivory-site/site

repo_url: https://github.com/daizutabi/ivory/
edit_uri: ""

theme: ivory

plugins:
  - search
  - pheasant:
      version: ivory
      cur_dir: config
      sys_paths: [examples]
  - mkapi

nav:
  - index.md
  - quickstart.md
  - Tutorial:
    - tutorial/data.md
    - tutorial/instance.md
    - tutorial/model.md
    - tutorial/callbacks.md
    - tutorial/trainer.md
    - tutorial/core.md
    - tutorial/task.md
    # - tutorial/run.md
  # - Python API:
  #   - api/data.md
  #   - Data: api/data.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
